<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Throw Bullet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@1&display=swap');

:root {
--bg: #ffffff;
--card: #f4f4f4;
--border: #e0e0e0;
--border-dark: #c0c0c0;
--text: #111111;
--mid: #666666;
--dim: #aaaaaa;
--accent: #111111;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(--bg);
color: var(--text);
font-family: 'DM Mono', monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 28px 16px 48px;
gap: 10px;
}

h1 {
font-family: 'Instrument Serif', serif;
font-style: italic;
font-weight: 400;
font-size: 1.45rem;
letter-spacing: -0.01em;
text-align: center;
color: var(--text);
}
.sub {
font-size: 0.57rem;
color: var(--dim);
letter-spacing: 0.11em;
text-transform: uppercase;
text-align: center;
margin-bottom: 2px;
}

.card {
background: var(--card);
border-radius: 6px;
padding: 15px 17px;
width: 100%;
max-width: 380px;
border: 1px solid var(--border);
}

.card-label {
font-size: 0.53rem;
letter-spacing: 0.13em;
text-transform: uppercase;
color: var(--dim);
margin-bottom: 10px;
}

/* Weight presets */
.weight-row {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 6px;
}
.w-btn {
background: var(--bg);
border: 1px solid var(--border-dark);
color: var(--mid);
font-family: 'DM Mono', monospace;
font-size: 0.7rem;
padding: 8px 4px 7px;
cursor: pointer;
border-radius: 4px;
transition: all 0.12s;
text-align: center;
line-height: 1.2;
}
.w-btn small {
display: block;
font-size: 0.5rem;
color: var(--dim);
margin-top: 2px;
}
.w-btn:hover { border-color: #888; color: var(--text); }
.w-btn.active {
background: var(--text);
border-color: var(--text);
color: #fff;
font-weight: 500;
}
.w-btn.active small { color: #aaa; }

/* Sliders */
.sliders { display: flex; flex-direction: column; gap: 15px; }
.slider-row { display: flex; flex-direction: column; gap: 6px; }
.slider-top {
display: flex;
justify-content: space-between;
align-items: baseline;
}
.slider-name {
font-size: 0.57rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(--mid);
}
.slider-num {
font-size: 0.83rem;
color: var(--text);
font-weight: 500;
}

input[type=range] {
-webkit-appearance: none;
width: 100%;
height: 2px;
background: var(--border-dark);
border-radius: 2px;
outline: none;
cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px;
height: 18px;
border-radius: 50%;
background: var(--text);
border: 2px solid var(--bg);
box-shadow: 0 0 0 1px #888;
cursor: grab;
transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:active {
transform: scale(1.2);
cursor: grabbing;
}

/* Profile view */
.preview {
background: var(--bg);
border: 1px solid var(--border);
border-radius: 6px;
width: 100%;
max-width: 380px;
display: flex;
align-items: center;
justify-content: center;
padding: 24px 16px;
min-height: 200px;
}

/* Stats */
.stats {
width: 100%;
max-width: 380px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 2px;
}
.stat {
background: var(--card);
border: 1px solid var(--border);
border-radius: 4px;
padding: 11px 14px;
}
.stat-label {
font-size: 0.51rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(--dim);
margin-bottom: 3px;
}
.stat-val {
font-size: 0.88rem;
color: var(--text);
}
.stat-unit {
font-size: 0.58rem;
color: var(--dim);
margin-left: 2px;
}

.toggle-wrap {
display: flex;
gap: 0;
border: 1px solid var(--border-dark);
border-radius: 5px;
overflow: hidden;
}
.unit-btn {
background: var(--bg);
border: none;
color: var(--mid);
font-family: 'DM Mono', monospace;
font-size: 0.68rem;
letter-spacing: 0.08em;
padding: 7px 18px;
cursor: pointer;
transition: all 0.12s;
}
.unit-btn:first-child { border-right: 1px solid var(--border-dark); }
.unit-btn:hover { color: var(--text); background: var(--card); }
.unit-btn.active {
background: var(--text);
color: #fff;
font-weight: 500;
}

.note {
font-size: 0.54rem;
color: var(--dim);
text-align: center;
max-width: 380px;
line-height: 1.7;
min-height: 1.2em;
}
</style>

</head>
<body>

<h1>Throw Bullet</h1>
<p class="sub">Mild steel · ρ = 7.85 g/cm³ · profile view</p>

<div class="toggle-wrap">
  <button class="unit-btn active" id="btn-metric">mm</button>
  <button class="unit-btn" id="btn-imperial">in</button>
</div>

<!-- Weight -->

<div class="card">
  <div class="card-label">Target Weight</div>
  <div class="weight-row">
    <button class="w-btn" data-g="226.8">8 oz<small>226.8g</small></button>
    <button class="w-btn" data-g="283.5">10 oz<small>283.5g</small></button>
    <button class="w-btn active" data-g="340.2">12 oz<small>340.2g</small></button>
    <button class="w-btn" data-g="453.6">16 oz<small>453.6g</small></button>
  </div>
</div>

<!-- Sliders -->

<div class="card">
  <div class="card-label">Dimensions</div>
  <div class="sliders">

    <div class="slider-row">
      <div class="slider-top">
        <span class="slider-name">Diameter</span>
        <span class="slider-num" id="d-val">—</span>
      </div>
      <input type="range" id="d-slider" min="15" max="75" step="0.5" value="35">
    </div>

    <div class="slider-row">
      <div class="slider-top">
        <span class="slider-name">Height</span>
        <span class="slider-num" id="h-val">—</span>
      </div>
      <input type="range" id="h-slider" min="15" max="160" step="0.5" value="44.5">
    </div>

    <div class="slider-row">
      <div class="slider-top">
        <span class="slider-name">Edge Radius</span>
        <span class="slider-num" id="r-val">—</span>
      </div>
      <!-- max set dynamically -->
      <input type="range" id="r-slider" min="0" max="25" step="0.5" value="0">
    </div>

  </div>
</div>

<!-- Profile SVG -->

<div class="preview">
  <svg id="prof" overflow="visible"></svg>
</div>

<!-- Stats -->

<div class="stats">
  <div class="stat">
    <div class="stat-label">Actual Mass</div>
    <div class="stat-val" id="s-mass">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">H : D</div>
    <div class="stat-val" id="s-ratio">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Height</div>
    <div class="stat-val" id="s-hin">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Diameter</div>
    <div class="stat-val" id="s-din">—</div>
  </div>
</div>

<p class="note" id="note"></p>

<script>
  const RHO = 7.85;

  let massG     = 340.2;
  let lastMoved = 'd';
  let useMetric = true;

  const dSlider = document.getElementById('d-slider');
  const hSlider = document.getElementById('h-slider');
  const rSlider = document.getElementById('r-slider');

  function cylVol(d, h) { return Math.PI * (d / 2) ** 2 * h; }

  function filletVol(d, r) {
    if (r <= 0) return 0;
    const R = d / 2;
    const perEdge = Math.PI * r * r * (R - r * (1 - Math.PI / 4));
    return 2 * Math.max(0, perEdge);
  }

  function targetVol() { return (massG / RHO) * 1000; }
  function maxFillet(d, h) { return Math.min(d / 2, h / 2); }

  function heightForD(d, r) {
    const rf = Math.min(r, maxFillet(d, 9999));
    return (targetVol() + filletVol(d, rf)) / (Math.PI * (d / 2) ** 2);
  }

  function diameterForH(h, r) {
    let d = 2 * Math.sqrt(targetVol() / (Math.PI * h));
    for (let i = 0; i < 50; i++) {
      const rf = Math.min(r, maxFillet(d, h));
      const err = cylVol(d, h) - filletVol(d, rf) - targetVol();
      d -= err / (Math.PI * (d / 2) * h);
    }
    return d;
  }

  function toDisplay(mm) { return useMetric ? mm : mm / 25.4; }
  function fromDisplay(val) { return useMetric ? val : val * 25.4; }
  function unitLabel() { return useMetric ? 'mm' : 'in'; }
  function fmt(mm) {
    if (useMetric) return mm.toFixed(1) + ' mm';
    return (mm / 25.4).toFixed(3) + ' in';
  }
  function fmtR(mm) {
    if (useMetric) return mm.toFixed(1) + ' mm';
    return (mm / 25.4).toFixed(3) + ' in';
  }

  const D_MIN_MM = 15, D_MAX_MM = 75;
  const H_MIN_MM = 15, H_MAX_MM = 160;

  function updateSliderRanges(d_mm, h_mm) {
    const rMax_mm = Math.floor(Math.min(d_mm / 2, h_mm / 2) * 2) / 2;

    if (useMetric) {
      dSlider.min  = D_MIN_MM; dSlider.max = D_MAX_MM; dSlider.step = 0.5;
      hSlider.min  = H_MIN_MM; hSlider.max = H_MAX_MM; hSlider.step = 0.5;
      rSlider.min  = 0; rSlider.max = rMax_mm; rSlider.step = 0.5;
    } else {
      dSlider.min  = (D_MIN_MM/25.4).toFixed(3); dSlider.max = (D_MAX_MM/25.4).toFixed(3); dSlider.step = 0.005;
      hSlider.min  = (H_MIN_MM/25.4).toFixed(3); hSlider.max = (H_MAX_MM/25.4).toFixed(3); hSlider.step = 0.005;
      rSlider.min  = 0; rSlider.max = (rMax_mm/25.4).toFixed(3); rSlider.step = 0.005;
    }
  }

  function renderProfile(d_mm, h_mm, r_mm) {
    const svg = document.getElementById('prof');
    const CW = 320, CH = 220;
    svg.setAttribute('width', CW);
    svg.setAttribute('height', CH);
    svg.setAttribute('viewBox', `0 0 ${CW} ${CH}`);

    const marginX = 66, marginY = 38;
    const sc = Math.min((CW - marginX*2) / d_mm, (CH - marginY*2) / h_mm);

    const d_px = d_mm * sc;
    const h_px = h_mm * sc;
    const f_px = Math.min(r_mm * sc, d_px / 2, h_px / 2);

    const left  = CW/2 - d_px/2;
    const right = CW/2 + d_px/2;
    const top   = CH/2 - h_px/2;
    const bot   = CH/2 + h_px/2;
    const cx    = CW/2;
    const f     = f_px;

    let profilePath;
    if (f < 0.5) {
      profilePath = `M ${left} ${top} L ${right} ${top} L ${right} ${bot} L ${left} ${bot} Z`;
    } else {
      profilePath = [
        `M ${left+f} ${top}`,
        `L ${right-f} ${top}`,
        `Q ${right} ${top} ${right} ${top+f}`,
        `L ${right} ${bot-f}`,
        `Q ${right} ${bot} ${right-f} ${bot}`,
        `L ${left+f} ${bot}`,
        `Q ${left} ${bot} ${left} ${bot-f}`,
        `L ${left} ${top+f}`,
        `Q ${left} ${top} ${left+f} ${top}`,
        `Z`
      ].join(' ');
    }

    const fullyRounded = f_px >= Math.min(d_px, h_px) / 2 - 0.5;
    const dLabel = useMetric ? `⌀ ${d_mm.toFixed(1)} mm` : `⌀ ${(d_mm/25.4).toFixed(3)}"`;
    const hLabel = useMetric ? `${h_mm.toFixed(1)} mm` : `${(h_mm/25.4).toFixed(3)}"`;
    const rLabel = useMetric ? `R ${r_mm.toFixed(1)}` : `R ${(r_mm/25.4).toFixed(3)}"`;

    svg.innerHTML = `
      <defs>
        <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#cccccc" stroke-width="1.2"/>
        </pattern>
        <clipPath id="pclip"><path d="${profilePath}"/></clipPath>
      </defs>
      <path d="${profilePath}" fill="url(#hatch)"/>
      <path d="${profilePath}" fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <line x1="${cx}" y1="${top-20}" x2="${cx}" y2="${bot+20}"
        stroke="#bbb" stroke-width="1" stroke-dasharray="5 3"/>

      <!-- height dim -->
      <line x1="${left-14}" y1="${top}" x2="${left-14}" y2="${bot}" stroke="#888" stroke-width="1"/>
      <line x1="${left-20}" y1="${top}" x2="${left-8}" y2="${top}" stroke="#888" stroke-width="1"/>
      <line x1="${left-20}" y1="${bot}" x2="${left-8}" y2="${bot}" stroke="#888" stroke-width="1"/>
      <polygon points="${left-14},${top+1} ${left-17},${top+7} ${left-11},${top+7}" fill="#888"/>
      <polygon points="${left-14},${bot-1} ${left-17},${bot-7} ${left-11},${bot-7}" fill="#888"/>
      <text x="${left-22}" y="${CH/2}" font-family="DM Mono,monospace" font-size="10" fill="#111"
        text-anchor="middle" dominant-baseline="middle"
        transform="rotate(-90,${left-22},${CH/2})">${hLabel}</text>

      <!-- diameter dim -->
      <line x1="${left}" y1="${top-14}" x2="${right}" y2="${top-14}" stroke="#888" stroke-width="1"/>
      <line x1="${left}"  y1="${top-20}" x2="${left}"  y2="${top-8}" stroke="#888" stroke-width="1"/>
      <line x1="${right}" y1="${top-20}" x2="${right}" y2="${top-8}" stroke="#888" stroke-width="1"/>
      <polygon points="${left+1},${top-14} ${left+7},${top-17} ${left+7},${top-11}" fill="#888"/>
      <polygon points="${right-1},${top-14} ${right-7},${top-17} ${right-7},${top-11}" fill="#888"/>
      <text x="${cx}" y="${top-24}" font-family="DM Mono,monospace" font-size="10" fill="#111"
        text-anchor="middle">${dLabel}</text>

      ${f > 1 ? `
        <line x1="${right-f*0.6}" y1="${top+f*0.4}" x2="${right+14}" y2="${top-10}"
          stroke="#aaa" stroke-width="0.8"/>
        <text x="${right+16}" y="${top-11}" font-family="DM Mono,monospace" font-size="9" fill="#666">${rLabel}</text>
      ` : ''}
      ${fullyRounded ? `
        <text x="${cx}" y="${bot+18}" font-family="DM Mono,monospace" font-size="8.5" fill="#aaa"
          text-anchor="middle">fully rounded ends</text>
      ` : ''}
    `;
  }

  function update(source) {
    let d = useMetric ? parseFloat(dSlider.value) : parseFloat(dSlider.value) * 25.4;
    let h = useMetric ? parseFloat(hSlider.value) : parseFloat(hSlider.value) * 25.4;
    let r = useMetric ? parseFloat(rSlider.value) : parseFloat(rSlider.value) * 25.4;

    const rMax_mm = Math.min(d / 2, h / 2);
    r = Math.min(r, rMax_mm);

    if (source === 'd') {
      lastMoved = 'd';
      h = Math.max(H_MIN_MM, Math.min(H_MAX_MM, heightForD(d, r)));
    } else if (source === 'h') {
      lastMoved = 'h';
      d = Math.max(D_MIN_MM, Math.min(D_MAX_MM, diameterForH(h, r)));
    } else {
      if (lastMoved === 'd') {
        h = Math.max(H_MIN_MM, Math.min(H_MAX_MM, heightForD(d, r)));
      } else {
        d = Math.max(D_MIN_MM, Math.min(D_MAX_MM, diameterForH(h, r)));
      }
    }

    const rMax2 = Math.min(d / 2, h / 2);
    r = Math.min(r, rMax2);

    updateSliderRanges(d, h);
    if (useMetric) {
      dSlider.value = d.toFixed(1);
      hSlider.value = h.toFixed(1);
      rSlider.value = r.toFixed(1);
    } else {
      dSlider.value = (d / 25.4).toFixed(4);
      hSlider.value = (h / 25.4).toFixed(4);
      rSlider.value = (r / 25.4).toFixed(4);
    }

    document.getElementById('d-val').textContent = fmt(d);
    document.getElementById('h-val').textContent = fmt(h);
    document.getElementById('r-val').textContent = fmtR(r);

    const mass = (cylVol(d, h) - filletVol(d, r)) / 1000 * RHO;
    document.getElementById('s-mass').innerHTML  = mass.toFixed(1) + '<span class="stat-unit">g</span>';
    document.getElementById('s-ratio').textContent = (h / d).toFixed(2) + ' : 1';

    document.getElementById('s-hin').innerHTML = useMetric
      ? h.toFixed(1) + '<span class="stat-unit"> mm</span>'
      : (h/25.4).toFixed(3) + '<span class="stat-unit"> in</span>';
    document.getElementById('s-din').innerHTML = useMetric
      ? d.toFixed(1) + '<span class="stat-unit"> mm</span>'
      : (d/25.4).toFixed(3) + '<span class="stat-unit"> in</span>';

    const note = document.getElementById('note');
    if (r > 0) {
      const lost = (filletVol(d, r) / 1000 * RHO).toFixed(1);
      note.textContent = `${lost}g removed by edge radii — height adjusted to compensate.`;
    } else {
      note.textContent = '';
    }

    renderProfile(d, h, r);
  }

  function switchUnits(toMetric) {
    if (useMetric === toMetric) return;

    const d_mm = useMetric ? parseFloat(dSlider.value) : parseFloat(dSlider.value) * 25.4;
    const h_mm = useMetric ? parseFloat(hSlider.value) : parseFloat(hSlider.value) * 25.4;
    const r_mm = useMetric ? parseFloat(rSlider.value) : parseFloat(rSlider.value) * 25.4;

    useMetric = toMetric;

    document.getElementById('btn-metric').classList.toggle('active', toMetric);
    document.getElementById('btn-imperial').classList.toggle('active', !toMetric);

    updateSliderRanges(d_mm, h_mm);

    if (useMetric) {
      dSlider.value = d_mm.toFixed(1);
      hSlider.value = h_mm.toFixed(1);
      rSlider.value = r_mm.toFixed(1);
    } else {
      dSlider.value = (d_mm / 25.4).toFixed(4);
      hSlider.value = (h_mm / 25.4).toFixed(4);
      rSlider.value = (r_mm / 25.4).toFixed(4);
    }

    document.getElementById('d-val').textContent = fmt(d_mm);
    document.getElementById('h-val').textContent = fmt(h_mm);
    document.getElementById('r-val').textContent = fmt(r_mm);

    const mass = (cylVol(d_mm, h_mm) - filletVol(d_mm, r_mm)) / 1000 * RHO;
    document.getElementById('s-mass').innerHTML = mass.toFixed(1) + '<span class="stat-unit">g</span>';
    document.getElementById('s-ratio').textContent = (h_mm / d_mm).toFixed(2) + ' : 1';
    document.getElementById('s-hin').innerHTML = useMetric
      ? h_mm.toFixed(1) + '<span class="stat-unit"> mm</span>'
      : (h_mm / 25.4).toFixed(3) + '<span class="stat-unit"> in</span>';
    document.getElementById('s-din').innerHTML = useMetric
      ? d_mm.toFixed(1) + '<span class="stat-unit"> mm</span>'
      : (d_mm / 25.4).toFixed(3) + '<span class="stat-unit"> in</span>';

    renderProfile(d_mm, h_mm, r_mm);
  }

  document.getElementById('btn-metric').addEventListener('click', () => switchUnits(true));
  document.getElementById('btn-imperial').addEventListener('click', () => switchUnits(false));

  dSlider.addEventListener('input', () => update('d'));
  hSlider.addEventListener('input', () => update('h'));
  rSlider.addEventListener('input', () => update('r'));

  document.querySelectorAll('.w-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.w-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      massG = parseFloat(btn.dataset.g);
      update('preset');
    });
  });

  update('preset');
</script>

</body>
</html>
